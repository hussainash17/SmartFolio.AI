<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="1.5"/>
  
  <!-- Chart/graph lines representing portfolio growth -->
  <path d="M8 28 L12 24 L16 26 L20 22 L24 20 L28 18 L32 16" 
        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Portfolio icon - stacked rectangles -->
  <rect x="12" y="14" width="6" height="4" fill="white" opacity="0.9" rx="0.5"/>
  <rect x="14" y="11" width="6" height="4" fill="white" opacity="0.7" rx="0.5"/>
  <rect x="16" y="8" width="6" height="4" fill="white" opacity="0.5" rx="0.5"/>
  
  <!-- Dollar sign -->
  <text x="20" y="32" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">$</text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg> 