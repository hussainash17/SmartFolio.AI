<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for the icon -->
  <circle cx="30" cy="30" r="25" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="2"/>
  
  <!-- Chart/graph lines representing portfolio growth -->
  <path d="M15 40 L20 35 L25 38 L30 32 L35 28 L40 25 L45 22" 
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Portfolio icon - stacked rectangles -->
  <rect x="18" y="20" width="8" height="6" fill="white" opacity="0.9" rx="1"/>
  <rect x="20" y="16" width="8" height="6" fill="white" opacity="0.7" rx="1"/>
  <rect x="22" y="12" width="8" height="6" fill="white" opacity="0.5" rx="1"/>
  
  <!-- Dollar sign -->
  <text x="30" y="50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">$</text>
  
  <!-- Text "PortfolioMax" -->
  <text x="70" y="25" fill="#1a202c" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Portfolio</text>
  <text x="70" y="42" fill="#3182ce" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Max</text>
  
  <!-- Tagline -->
  <text x="70" y="52" fill="#718096" font-family="Arial, sans-serif" font-size="10">Investment Platform</text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg> 