# ===================================================================
# DSE Data Scraper Application Configuration
# ===================================================================

# Application
spring.application.name=dse-data-scraper

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
spring.datasource.url=jdbc:postgresql://192.168.3.98:5432/app
spring.datasource.username=postgres
spring.datasource.password=changethis
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false

# Batch Processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Performance
spring.jpa.open-in-view=false

# ===================================================================
# SCRAPER CONFIGURATION
# ===================================================================

# DSE URLs
scraper.dse.base-url=https://dsebd.org
scraper.dse.latest-share-price-url=https://dsebd.org/latest_share_price_scroll_by_ltp.php
scraper.dse.company-detail-url=https://dsebd.org/displayCompany.php?name=%s
scraper.dse.market-summary-url=https://dsebd.org
scraper.dse.news-url=https://dsebd.org/display_news.php
scraper.dse.news-ajax-url=https://dsebd.org/ajax/load-news.php

# Schedule Configuration
scraper.schedule.enabled=true
scraper.schedule.timezone=Asia/Dhaka

# Real-time scraper: Every 1 minute during market hours (10 AM - 2:30 PM, Mon-Thu)
scraper.schedule.realtime-cron=0 */1 10-15 * * SUN-THU

# Fundamental scraper: Daily at 4 PM after market close (Mon-Thu)
scraper.schedule.fundamental-cron=0 0 16 * * MON-THU

# Daily OHLC aggregation: At 3:30 PM (Mon-Thu)
scraper.schedule.daily-aggregation-cron=0 30 15 * * MON-THU

# Index instrument scraper: Every 30 seconds
scraper.schedule.index-cron=0/30 * 10-14 * * SUN-THU

# Company list sync: Weekly on Saturday at 10 AM
scraper.schedule.company-list-sync-cron=0 0 10 * * SAT

scraper.schedule.portfolio-valuation-cron=0 30 14 * * MON-THU

scraper.schedule.fundamental-cache-cron=0 */10 10-15 * * SUN-THU

# Cleanup: Monthly on 1st day at 2 AM
scraper.schedule.cleanup-cron=0 0 2 1 * *

scraper.schedule.market-summary-cron=0/30 * 10-14 * * SUN-THU

# Retry Configuration
scraper.retry.enabled=true
scraper.retry.max-attempts=3
scraper.retry.initial-delay=1000
scraper.retry.max-delay=10000
scraper.retry.multiplier=2.0

# HTTP Client Configuration
scraper.http.connection-timeout=30000
scraper.http.read-timeout=60000
scraper.http.max-connections=50
scraper.http.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

# Batch Processing
scraper.batch.batch-size=20
scraper.batch.thread-pool-size=10
scraper.batch.parallel-processing=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
logging.level.com.dohatec.oms.datascraper=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file
logging.file.name=logs/dse-scraper.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===================================================================
# ACTUATOR CONFIGURATION (Optional - for monitoring)
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.simple.metrics.export.enabled=true

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080
server.compression.enabled=true
server.http2.enabled=true

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
